{{ define "main" }}
<article class="post post--single">
  {{ if .Title }}
  <h1 class="post-title">{{ .Title }}</h1>
  {{ end }}
  <time class="post-date" datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
    {{ .Date.Format "January 2, 2006" }}
  </time>
  <div class="post-content">{{ .Content }}</div>
</article>
{{ end }}
